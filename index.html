<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/susi.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignupSignin - Volunteer Event Management</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #161d35;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 160px;
        height: auto;
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.03); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/susi.png" alt="SignUpSignIn" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
